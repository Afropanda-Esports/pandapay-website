<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/icon-dark.png" />
    <link rel="apple-touch-icon" href="/icon-dark.png" />

    <!-- Primary Meta Tags -->
    <title>Panda Pay — Buy Gaming Gift Cards on WhatsApp | Nigeria & Ghana</title>
    <meta name="title" content="Panda Pay — Buy Gaming Gift Cards on WhatsApp | Nigeria & Ghana" />
    <meta name="description" content="Buy gaming gift cards and subscriptions on WhatsApp using Naira, USDC, or crypto. PandaPay handles pricing, payment confirmation, and instant code delivery." />
    <meta name="keywords" content="gaming gift cards, WhatsApp checkout, game subscriptions, Naira payments, USDC payments, crypto payments, PandaPay" />
    <meta name="author" content="PandaPay" />
    <meta name="theme-color" content="#0a0a0a" />

    <!-- FOUT prevention: apply dark class before React loads -->
    <script>
      (function() {
        try {
          var stored = localStorage.getItem('theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

          if (stored === 'dark' || (!stored && prefersDark) || (stored === 'system' && prefersDark)) {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {
          /* no-op */
        }
      })();
    </script>

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://pandapay.com/" />
    <meta property="og:title" content="Panda Pay — Buy Gaming Gift Cards on WhatsApp | Nigeria & Ghana" />
    <meta property="og:description" content="Buy gaming gift cards and subscriptions on WhatsApp using Naira, USDC, or crypto. PandaPay handles pricing, payment confirmation, and instant code delivery." />
    <meta property="og:image" content="/icon-dark.png" />
    <meta property="og:site_name" content="PandaPay" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://pandapay.com/" />
    <meta property="twitter:title" content="Panda Pay — Buy Gaming Gift Cards on WhatsApp | Nigeria & Ghana" />
    <meta property="twitter:description" content="Buy gaming gift cards and subscriptions on WhatsApp using Naira, USDC, or crypto. PandaPay handles pricing, payment confirmation, and instant code delivery." />
    <meta property="twitter:image" content="/icon-dark.png" />

    <!-- Robots -->
    <meta name="robots" content="index, follow" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
